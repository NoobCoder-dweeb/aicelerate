<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AICelerate - Settings</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/settings.css') }}">
  <!-- Tailwind CSS (CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet" />
  
</head>

<body class="font-sans bg-gray-50 text-gray-900">
  {% include "_header.html" %}

  <div class="layout flex flex-1 min-h-screen">
    {% include "_sidebar.html" %}

    <!-- Main -->
    <div class="main-content flex-1 p-6 overflow-auto">
      <div id="settings-page" class="max-w-6xl mx-auto">
        <!-- Header -->
        <div class="page-header mb-8">
          <h1 class="text-[clamp(1.5rem,3vw,2.5rem)] font-bold mb-2">
            Settings
          </h1>
          <p class="text-gray-500 mt-2">
            Manage your account details and application preferences.
          </p>
        </div>

        <!-- Grid -->
<div class="grid grid-cols-1 justify-items-center">

  <!-- Password -->
  <div class="card p-6 rounded-lg shadow-md border w-full max-w-xl">

    <div class="card-header flex items-center mb-4">
      <i class="fa-solid fa-lock text-2xl mr-3 text-purple-500"></i>
      <h3 class="text-lg font-semibold">Password Update</h3>
    </div>
    <form class="space-y-4" id="password-form">
      <!-- Current Username (Read-Only) -->
      <div class="mb-4">
        <label class="block mb-1 font-medium">Current Username</label>
        <div class="flex items-center mt-1 bg-gray-100 p-2 rounded">
          <i class="fas fa-user mr-2 text-gray-500"></i>
          <span class="text-black font-medium">
            {{ current_user.id }}
          </span>
        </div>
        <input type="hidden" name="current_username" value="{{ current_user.id }}">
      </div>

      <div>
        <label for="current_password" class="block mb-1 font-medium">Current Password</label>
        <div class="relative">
          <i class="fa-solid fa-key absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
          <input type="password" id="current_password"
            class="border rounded p-2 pl-10 w-full focus:outline-none focus:ring-2 focus:ring-purple-500"
            placeholder="Enter current password" />
        </div>
      </div>
      <div>
        <label for="new_password" class="block mb-1 font-medium">New Password</label>
        <div class="relative">
          <i class="fa-solid fa-shield-halved absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
          <input type="password" id="new_password"
            class="border rounded p-2 pl-10 w-full focus:outline-none focus:ring-2 focus:ring-purple-500"
            minlength="8" placeholder="At least 8 characters" />
        </div>
      </div>
      <div>
        <label for="confirm_password" class="block mb-1 font-medium">Confirm New Password</label>
        <div class="relative">
          <i class="fa-solid fa-shield-virus absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
          <input type="password" id="confirm_password"
            class="border rounded p-2 pl-10 w-full focus:outline-none focus:ring-2 focus:ring-purple-500"
            minlength="8" placeholder="Re-enter new password" />
        </div>
      </div>
      <button type="submit"
        class="w-full bg-purple-500 hover:bg-purple-600 text-white px-4 py-2 rounded transition-colors flex items-center justify-center">
        <i class="fa-solid fa-key mr-2"></i> Update Password
      </button>
    </form>
  </div>

  <!-- Preferences -->
  
</div>

      </div>
    </div>
  </div>

  <!-- Reusable Popup Modal -->
<div id="popupModal"
  class="hidden fixed inset-0 flex items-center justify-center bg-black bg-opacity-50 z-50">
  <div class="bg-white rounded-lg shadow-lg p-6 max-w-sm w-full text-center">
    <h2 id="popupTitle" class="text-lg font-semibold mb-2 text-gray-800">Message</h2>
    <p id="popupMessage" class="text-gray-600 mb-4"></p>
    <div class="flex justify-center">
      <button id="popupBtn" onclick="closePopup()"
        class="px-6 py-2 text-white rounded transition">
        OK
      </button>
    </div>
  </div>
</div>
<script>
  const UPDATE_PASSWORD_URL = "{{ url_for('settings_bp.update_password') }}";
</script>
<script src="{{ url_for('static', filename='js/settings.js') }}"></script>

</body>
</html>
